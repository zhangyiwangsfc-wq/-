<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股财报筛选结果 - 独立版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .header p {
            color: #888;
            font-size: 1.1rem;
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .summary-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        .summary-card h3 {
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .summary-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
        }
        .table-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
            margin-bottom: 30px;
        }
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .table-title {
            font-size: 1.5rem;
            color: #00d4ff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .table-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #00d4ff, #7c3aed);
            border-radius: 2px;
        }
        table {
            width: auto;
            min-width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            overflow: hidden;
            table-layout: fixed;
        }
        th, td {
            padding: 10px 6px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
            font-size: 0.85rem;
            vertical-align: middle;
        }
        th:nth-child(1), td:nth-child(1) { width: 100px; }
        th:nth-child(2), td:nth-child(2) { width: 120px; }
        th:nth-child(3), td:nth-child(3) { width: 110px; }
        th:nth-child(4), td:nth-child(4) { width: 110px; }
        th:nth-child(5), td:nth-child(5) { width: 110px; }
        th:nth-child(6), td:nth-child(6) { width: 110px; }
        th:nth-child(7), td:nth-child(7) { width: 120px; }
        th:nth-child(8), td:nth-child(8) { width: 110px; }
        th:nth-child(9), td:nth-child(9) { width: 110px; }
        th:nth-child(10), td:nth-child(10) { width: 110px; }
        th:nth-child(11), td:nth-child(11) { width: 110px; }
        th {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        td {
            color: #fff;
            font-size: 0.95rem;
        }
        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .stock-code {
            font-weight: bold;
            color: #7c3aed;
            cursor: pointer;
            text-decoration: underline;
        }
        .stock-code:hover {
            color: #00d4ff;
        }
        .stock-code.selected {
            color: #00d4ff;
            background: rgba(0, 212, 255, 0.2);
            border-radius: 4px;
            padding: 2px 6px;
        }
        .stock-name {
            font-weight: 500;
        }
        .positive {
            color: #22c55e;
            font-weight: bold;
        }
        .negative {
            color: #ff6b6b;
            font-weight: bold;
        }
        .neutral {
            color: #888;
        }
        .highlight {
            background: rgba(0, 212, 255, 0.1);
            border-radius: 4px;
            padding: 2px 6px;
        }
        .no-data {
            text-align: center;
            padding: 60px;
            color: #888;
            font-size: 1.2rem;
        }
        .charts-section {
            margin-top: 30px;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chart-title {
            font-size: 1.3rem;
            color: #00d4ff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chart-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #00d4ff, #7c3aed);
            border-radius: 2px;
        }
        .chart-container {
            position: relative;
            height: 350px;
        }
        .selected-stock-info {
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            border-left: 4px solid #00d4ff;
        }
        .selected-stock-info h3 {
            color: #00d4ff;
            margin-bottom: 8px;
        }
        .trend-value {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 2px;
            font-size: 0.9rem;
        }
        .trend-value.positive {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        .trend-value.negative {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }
        .trend-value.neutral {
            background: rgba(136, 136, 136, 0.2);
            color: #888;
        }
        .trend-label {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 2px;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
            font-weight: 500;
        }
        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .search-box input {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #3a3a5c;
            border-radius: 8px;
            background: #1a1a2e;
            color: #fff;
            width: 200px;
            transition: all 0.3s;
        }
        .search-box input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        .search-box button {
            padding: 12px 30px;
            font-size: 16px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .card-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #00d4ff, #7c3aed);
            border-radius: 2px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .info-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 8px;
        }
        .info-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 6px;
        }
        .info-value {
            font-size: 1.1rem;
            color: #fff;
            font-weight: 500;
        }
        .surprise-section {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
        }
        .surprise-item {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(124, 58, 237, 0.1));
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
        .surprise-label {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 8px;
        }
        .surprise-value {
            font-size: 1.4rem;
            font-weight: bold;
            color: #00d4ff;
        }
        
        /* 移动端适配 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .container {
                max-width: 100%;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .header p {
                font-size: 0.9rem;
            }
            
            .summary-cards {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            
            .summary-card {
                padding: 15px;
            }
            
            .summary-card .value {
                font-size: 1.5rem;
            }
            
            .search-box {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            
            .search-box input {
                width: 100%;
                max-width: 300px;
                font-size: 14px;
                padding: 10px 15px;
            }
            
            .search-box button {
                width: 100%;
                max-width: 300px;
                font-size: 14px;
                padding: 10px 20px;
            }
            
            .table-container {
                padding: 15px;
                margin-bottom: 20px;
            }
            
            .table-wrapper {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            
            table {
                font-size: 0.8rem;
                min-width: 800px;
            }
            
            th, td {
                padding: 8px 4px;
                font-size: 0.75rem;
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .chart-card {
                padding: 15px;
            }
            
            .chart-container {
                height: 250px;
            }
            
            .selected-stock-info {
                padding: 12px;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }
        
        @media (max-width: 480px) {
            .summary-cards {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
            
            .table-container {
                padding: 10px;
            }
            
            th, td {
                padding: 6px 3px;
                font-size: 0.7rem;
            }
            
            .chart-container {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>A股财报筛选结果</h1>
            <p>基于6个自定义条件的财报数据筛选 - 独立版 (数据已嵌入)</p>
        </div>
        
        <div class="search-box">
            <input type="text" id="stockSearchCode" placeholder="输入证券代码查询" maxlength="6">
            <button onclick="searchStock()">查询</button>
            <button onclick="clearSearch()" style="background: linear-gradient(135deg, #ef4444, #dc2626);">清除</button>
            <button onclick="generateAndSync()" id="generateBtn" style="background: linear-gradient(135deg, #8b5cf6, #7c3aed);">
                <span id="generateBtnText">生成独立版并同步</span>
            </button>
        </div>
        
        <div class="summary-cards">
            <div class="summary-card">
                <h3>筛选总股票数</h3>
                <div class="value" id="totalStocks">-</div>
            </div>
            <div class="summary-card">
                <h3>符合条件股票</h3>
                <div class="value" id="qualifiedStocks">-</div>
            </div>
            <div class="summary-card">
                <h3>通过率</h3>
                <div class="value" id="passRate">-</div>
            </div>
            <div class="summary-card">
                <h3>筛选时间</h3>
                <div class="value" id="filterTime">-</div>
            </div>
        </div>
        
        <div class="table-container">
            <div class="table-title">筛选结果详情（点击证券代码查看图表）</div>
            <div class="table-wrapper">
                <table id="resultsTable">
                <thead>
                    <tr>
                        <th>证券代码</th>
                        <th>证券简称</th>
                        <th>①年化盈利同比202512</th>
                        <th>年化盈利同比202509</th>
                        <th>年化盈利同比202506</th>
                        <th>②年化盈利环比202512</th>
                        <th>④实际盈利超预期判断</th>
                        <th>⑤实际盈利超预期比例</th>
                        <th>⑥年化营收同比202512</th>
                        <th>年化营收同比202509</th>
                        <th>年化营收同比202506</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- 数据将通过JavaScript填充 -->
                </tbody>
            </table>
            </div>
        </div>
        
        <div class="charts-section" id="chartsSection" style="display: none;">
            <div class="selected-stock-info" id="selectedStockInfo">
                <h3 id="selectedStockTitle">请点击表格中的证券代码查看详细图表</h3>
                <div id="selectedStockDetails"></div>
            </div>
            
            <!-- 基本信息 -->
            <div class="card">
                <div class="card-title">基本信息</div>
                <div class="info-grid" id="basicInfo"></div>
            </div>
            
            <!-- 盈利预期 -->
            <div class="card">
                <div class="card-title">盈利预期</div>
                <div class="surprise-section" id="surpriseSection"></div>
            </div>
            
            <!-- 六幅图 3x2 排列 -->
            <div class="charts-grid">
                <!-- 盈利表现 -->
                <div class="chart-card">
                    <div class="chart-title">盈利表现</div>
                    <div class="chart-container">
                        <canvas id="profitChart"></canvas>
                    </div>
                </div>
                
                <!-- 年化盈利环比表现 -->
                <div class="chart-card">
                    <div class="chart-title">年化盈利环比表现</div>
                    <div class="chart-container">
                        <canvas id="profitQoQChart"></canvas>
                    </div>
                </div>
                
                <!-- 营收表现 -->
                <div class="chart-card">
                    <div class="chart-title">营收表现</div>
                    <div class="chart-container">
                        <canvas id="revenueChart"></canvas>
                    </div>
                </div>
                
                <!-- 年化营收环比表现 -->
                <div class="chart-card">
                    <div class="chart-title">年化营收环比表现</div>
                    <div class="chart-container">
                        <canvas id="revenueQoQChart"></canvas>
                    </div>
                </div>
                
                <!-- 预期比较 -->
                <div class="chart-card">
                    <div class="chart-title">预期比较</div>
                    <div class="chart-container">
                        <canvas id="profitForecastChart"></canvas>
                    </div>
                </div>
                
                <!-- 营收盈利表现 -->
                <div class="chart-card">
                    <div class="chart-title">单季营收与盈利同比表现</div>
                    <div class="chart-container">
                        <canvas id="revenueProfitChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let filterData = [];
        let allData = [];
        let selectedStock = null;
        let charts = {};
        
        // 页面加载时获取数据
        window.addEventListener('load', function() {
            loadFilterResults();
        });
        
        // 回车搜索
        document.getElementById('stockSearchCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchStock();
        });
        
        async function loadFilterResults() {
            try {
                // 从API服务器获取筛选结果
                const response = await fetch('http://localhost:5001/api/excel_data');
                if (!response.ok) {
                    throw new Error('无法获取数据，请确保API服务器正在运行');
                }
                
                allData = await response.json();
                
                // 应用筛选条件
                filterData = applyFilterConditions(allData);
                
                // 更新页面
                updateSummaryCards(allData.length, filterData.length);
                renderResultsTable();
                
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="11" class="no-data">加载数据失败，请确保API服务器正在运行</td></tr>';
            }
        }
        
        function applyFilterConditions(data) {
            const results = [];
            
            for (const row of data) {
                try {
                    // 条件①: 年化盈利同比202512 > 0.3
                    const val_同比512 = parseFloat(row['年化盈利同比202512']) || 0;
                    if (val_同比512 <= 0.3) continue;
                    
                    // 条件②: 年化盈利环比202512 >= 0.25
                    const val_环比512 = parseFloat(row['年化盈利环比202512']) || 0;
                    if (val_环比512 < 0.25) continue;
                    
                    // 条件③: 年化盈利同比202512、202509、202506中至少有两个 > 0
                    const val_同比509 = parseFloat(row['年化盈利同比202509']) || 0;
                    const val_同比506 = parseFloat(row['年化盈利同比202506']) || 0;
                    const countPositive = [val_同比512, val_同比509, val_同比506].filter(v => v > 0).length;
                    if (countPositive < 2) continue;
                    
                    // 条件④: 实际盈利超预期判断不能是"不及预期"
                    const 超预期判断 = row['实际盈利超预期判断'];
                    if (超预期判断 === '不及预期') continue;
                    
                    // 条件⑤: 年化盈利环比202512 >= 1 且 实际盈利超预期比例 >= 0.2
                    if (val_环比512 >= 1) {
                        const 超预期比例 = parseFloat(row['实际盈利超预期比例']);
                        if (!isNaN(超预期比例) && 超预期比例 < 0.2) continue;
                    }
                    
                    // 条件⑥: 如果有年化盈利同比202512，则 >= 年化盈利同比202509
                    if (!isNaN(val_同比512) && !isNaN(val_同比509) && val_同比512 < val_同比509) continue;
                    
                    // 所有条件都满足，添加到结果
                    results.push(row);
                    
                } catch (error) {
                    console.error('处理股票数据时出错:', error, row);
                }
            }
            
            return results;
        }
        
        function updateSummaryCards(totalCount, qualifiedCount) {
            document.getElementById('totalStocks').textContent = totalCount;
            document.getElementById('qualifiedStocks').textContent = qualifiedCount;
            
            const passRate = totalCount > 0 ? ((qualifiedCount / totalCount) * 100).toFixed(2) : 0;
            document.getElementById('passRate').textContent = passRate + '%';
            
            const now = new Date();
            document.getElementById('filterTime').textContent = 
                `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }
        
        function renderResultsTable() {
            const tbody = document.getElementById('tableBody');
            
            if (filterData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" class="no-data">没有符合筛选条件的股票</td></tr>';
                return;
            }
            
            tbody.innerHTML = filterData.map(row => {
                const stockCode = row['证券代码'] || '-';
                const stockName = row['证券简称'] || '-';
                
                // ①年化盈利同比202512
                const profitYoy512 = parseFloat(row['年化盈利同比202512']) || 0;
                const profitYoy512Display = formatPercent(profitYoy512);
                
                // 年化盈利同比202509
                const profitYoy509 = parseFloat(row['年化盈利同比202509']) || 0;
                const profitYoy509Display = formatPercent(profitYoy509);
                
                // 年化盈利同比202506
                const profitYoy506 = parseFloat(row['年化盈利同比202506']) || 0;
                const profitYoy506Display = formatPercent(profitYoy506);
                
                // ②年化盈利环比202512
                const profitQoq512 = parseFloat(row['年化盈利环比202512']) || 0;
                const profitQoq512Display = formatPercent(profitQoq512);
                
                // ④实际盈利超预期判断
                const surpriseJudgment = row['实际盈利超预期判断'] || '-';
                
                // ⑤实际盈利超预期比例
                const surpriseRatio = parseFloat(row['实际盈利超预期比例']) || 0;
                const surpriseRatioDisplay = formatPercent(surpriseRatio);
                
                // ⑥年化营收同比202512
                const revenueYoy512 = parseFloat(row['年化营收同比202512']) || 0;
                const revenueYoy512Display = formatPercent(revenueYoy512);
                
                // 年化营收同比202509
                const revenueYoy509 = parseFloat(row['年化营收同比202509']) || 0;
                const revenueYoy509Display = formatPercent(revenueYoy509);
                
                // 年化营收同比202506
                const revenueYoy506 = parseFloat(row['年化营收同比202506']) || 0;
                const revenueYoy506Display = formatPercent(revenueYoy506);

        function formatDate(value) {
            if (value === null || value === undefined || value === '-' || value === '') {
                return '-';
            }
            
            // 如果已经是YYYY-MM-DD格式，直接返回
            if (typeof value === 'string' && value.includes('-')) {
                return value;
            }
            
            // 处理数字格式的日期
            let dateStr = String(value).trim();
            
            // 移除小数点后的.0
            if (dateStr.endsWith('.0')) {
                dateStr = dateStr.slice(0, -2);
            }
            
            // 如果是8位数字，格式化为YYYY-MM-DD
            if (dateStr.length === 8 && /^\d+$/.test(dateStr)) {
                const year = dateStr.substring(0, 4);
                const month = dateStr.substring(4, 6);
                const day = dateStr.substring(6, 8);
                return `${year}-${month}-${day}`;
            }
            
            // 其他情况返回原值
            return value;
        }

        function clearSearch() {

        async function generateAndSync() {
            const generateBtn = document.getElementById('generateBtn');
            const generateBtnText = document.getElementById('generateBtnText');
            
            // 禁用按钮，显示加载状态
            generateBtn.disabled = true;
            generateBtnText.textContent = '生成中...';
            
            try {
                // 第一步：生成独立版
                const response = await fetch('http://localhost:5001/api/generate_standalone_html', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // 生成成功，开始同步
                    generateBtnText.textContent = '同步中...';
                    
                    const syncResponse = await fetch('http://localhost:5001/api/sync_to_github', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    const syncResult = await syncResponse.json();
                    
                    if (syncResult.success) {
                        // 全部成功
                        generateBtnText.textContent = '✓ 完成';
                        generateBtn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';
                        
                        alert(`独立版生成并同步成功！\n\n生成文件：${result.filename}\n数据条数：${result.data_count}\n\n${syncResult.output}`);
                        
                        // 3秒后恢复按钮状态
                        setTimeout(() => {
                            generateBtn.disabled = false;
                            generateBtnText.textContent = '生成独立版并同步';
                            generateBtn.style.background = 'linear-gradient(135deg, #8b5cf6, #7c3aed)';
                        }, 3000);
                        
                    } else {
                        // 生成成功但同步失败
                        generateBtnText.textContent = '✗ 同步失败';
                        generateBtn.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
                        
                        alert(`独立版生成成功，但同步失败！\n\n生成文件：${result.filename}\n数据条数：${result.data_count}\n\n同步错误：${syncResult.message}\n${syncResult.error}\n\n文件已保存到本地，可手动上传到GitHub`);

                            generateBtn.style.background = 'linear-gradient(135deg, #8b5cf6, #7c3aed)';
                        }, 3000);
                    }

                        generateBtn.style.background = 'linear-gradient(135deg, #8b5cf6, #7c3aed)';
                    }, 3000);
                }
                
            } catch (error) {
                // 网络错误或其他异常

                generateBtn.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';

                    generateBtn.style.background = 'linear-gradient(135deg, #8b5cf6, #7c3aed)';
                }, 3000);
            }
        }
